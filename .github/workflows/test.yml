name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.25.0
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder har-viewer dist for go:embed
        run: |
          mkdir -p har-viewer/project-api-capture-react/dist
          printf '%s\n' '<!doctype html><title>placeholder</title>' > har-viewer/project-api-capture-react/dist/index.html
      - name: Go test
        run: go test -v ./...

      - name: Install doctest
        # Pin to the cross-device rename fix branch until it lands on @latest.
        run: go install github.com/xhd2015/doctest/cmd/doctest@master-2026-07-16-fix-cross-device-rename-version
      - name: Doctest
        run: doctest test -v ./...

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Browser Agent</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        min-width: 280px;
        max-width: 360px;
        margin: 12px;
        font-size: 13px;
      }
      h1 {
        font-size: 1.1rem;
        margin: 0 0 0.5rem;
      }
      code {
        background: #f4f4f4;
        padding: 0.1em 0.3em;
        word-break: break-all;
        font-size: 11px;
      }
      .row {
        margin: 0.35rem 0;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      .ok {
        color: #0a7a2f;
        font-weight: 600;
      }
      .warn {
        color: #c45c00;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Browser Agent</h1>
    <p class="muted">Control port <strong>43761</strong></p>

    <div class="row">
      <strong>Package (this load)</strong>
    </div>
    <div class="row">
      version <code id="pkg-version">…</code>
    </div>
    <div class="row">
      md5 <code id="pkg-md5">…</code>
    </div>

    <div class="row" style="margin-top: 0.75rem">
      <strong>Control server</strong>
      <span id="ctrl-status" class="muted">checking…</span>
    </div>
    <p class="muted" data-connection-status id="conn-hint">
      Open a session page to connect.
    </p>

    <!-- External scripts only (MV3 CSP: script-src 'self', no inline). -->
    <script src="bundle-sum.js"></script>
    <script src="popup.js"></script>
  </body>
</html>

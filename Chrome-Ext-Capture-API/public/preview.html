<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Capture - HAR Preview</title>
  <link rel="stylesheet" href="preview.css" />
</head>
<body>
  <div class="header">
    <h1>API Capture — HAR Preview</h1>
    <div class="header-controls">
      <span class="entry-count" id="entryCount">0 entries</span>
    </div>
  </div>
  <div class="toolbar">
    <input type="text" id="filterInput" placeholder="Filter by URL or method..." />
    <select id="statusFilter">
      <option value="all">All Status</option>
      <option value="2xx">2xx</option>
      <option value="3xx">3xx</option>
      <option value="4xx">4xx</option>
      <option value="5xx">5xx</option>
    </select>
  </div>
  <div class="table-container">
    <table id="entriesTable">
      <thead>
        <tr>
          <th class="col-method">Method</th>
          <th class="col-url">URL</th>
          <th class="col-status">Status</th>
          <th class="col-type">Type</th>
          <th class="col-time">Time</th>
          <th class="col-size">Size</th>
        </tr>
      </thead>
      <tbody id="entriesBody"></tbody>
    </table>
  </div>
  <div id="detailPanel" class="detail-panel hidden">
    <div class="detail-header">
      <h2 id="detailTitle">Request Detail</h2>
      <button id="closeDetail">×</button>
    </div>
    <div class="detail-content">
      <h3>Request</h3>
      <pre id="detailRequest"></pre>
      <h3>Response</h3>
      <pre id="detailResponse"></pre>
      <h3>Headers</h3>
      <pre id="detailHeaders"></pre>
    </div>
  </div>
  <div id="emptyState" class="empty-state hidden">No entries found.</div>
  <script src="preview.js"></script>
</body>
</html>
